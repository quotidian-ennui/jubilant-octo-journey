# This file was generated by the "Generate Dependabot Glob" action. Do not edit it directly.
# Make changes to `.github/dependabot.template.yml` and a PR will be automatically created.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: "cron"
      cronjob: "23 4 * * 0,2,4"
    allow:
      - dependency-type: all
    commit-message:
      prefix: "deps(actions): "
  - package-ecosystem: docker
    directories:
      - "generatedata"
      - "jaeger"
      - "localstack"
      - "md2pdf"
      - "plantuml"
      - "pulsar"
      - "rabbitmq"
      - "solace"
      - "superset"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:23"
      timezone: Europe/London
    allow:
      - dependency-type: all
    commit-message:
      prefix: "deps(docker): "
